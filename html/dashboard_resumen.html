<!DOCTYPE html>
<!-- ========================================== -->
<!-- 📍 DEFENSA (ATRIBUTO PERSONALIZADO): 
     data-theme="light": Es un atributo personalizado (HTML5 permite crear atributos propios si empiezan con "data-"). 
     Lo usamos para que nuestro CSS sepa qué variables de colores usar (Modo Claro o Modo Oscuro). 
     El JavaScript cambiará este valor a "dark" al presionar el botón. -->
<!-- ========================================== -->
<html lang="es" data-theme="light" data-page-title="Banca 360 - Dashboard">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca 360 - Dashboard</title>
    
    <!-- FUENTE DE GOOGLE (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 📍 ENLACE AL CSS MAESTRO (Ajustado para salir de la carpeta HTML y entrar a CSS) -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- SCRIPTS DE CABECERA (Tema oscuro y variables) -->
    <script src="../js/theme-persist.js"></script>
    <script src="../js/head-common.js"></script>
</head>
<body data-current-nav="dashboard">

    <!-- Sidebar: markup único en js/sidebar.js (evita duplicar en cada página). -->
    <aside class="sidebar" id="main-sidebar"></aside>

    <main class="main-content" id="app-content">
        
        <!-- 📍 DEFENSA: DASHBOARD / LANDING PAGE -->
        <!-- NOTA: aria-labelledby enlaza esta sección con el ID de su título para mayor accesibilidad -->
        <section id="dashboard-view" class="view-section active" aria-labelledby="dashboard-title">
            <header class="view-header">
                <!-- Texto real: MOCK.usuario (script_p2.js) -->
                <h1 id="dashboard-title" class="header-title">—</h1>
            </header>
            
            <!-- 📍 DEFENSA: SALDO CON FUNCIÓN OCULTAR -->
            <article class="card balance-card">
                <h2 class="balance-label">Saldo Disponible</h2>
                <div class="balance-wrapper">
                    <span id="balance-amount" class="balance-amount">—</span>
                    <button type="button" id="toggle-visibility-btn" class="btn-icon" aria-label="Ocultar Saldo">
                        <span id="visibility-icon" aria-hidden="true">👁️</span>
                    </button>
                </div>
                <p id="account-mask" class="account-hint">—</p>
            </article>

    

            <!-- 📍 DEFENSA: ÚLTIMAS 3 TRANSACCIONES -->
            <section class="recent-transactions">
                <header class="section-header">
                    <h3 class="section-title">Últimos Movimientos</h3>
                    <a href="historial_movimientos.html" class="link-primary" id="link-view-all">Ver todos</a>
                </header>
                
                <!-- 📍 DEFENSA: Se deja el contenedor vacío para que JS se encargue de pintarlo sin "saltos" visuales -->
                <div class="tx-list" id="recent-tx-list"></div>
            </section>
        </section>

    </main>

    <!-- 1. El script de la barra lateral (Estructura) -->
    <script src="../js/sidebar.js"></script>

    <!-- 2. Primero cargamos los datos para tenerlos en memoria -->
    <script src="../js/cuentas.js"></script>

    <!-- 3. Luego cargamos la lógica, que utilizará los datos -->
    <script src="../js/dashboard-detalles_operaciones.js"></script>
</body>
</html>
