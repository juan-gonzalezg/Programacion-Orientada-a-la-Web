<!DOCTYPE html>
<html lang="es" data-theme="light" data-page-title="Banca 360 - Depósitos">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca 360 - Depósitos</title>
    
    <!-- FUENTE DE GOOGLE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 📍 EL ENLACE CORRECTO AL CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- 📍 RUTAS CORRECTAS A LOS SCRIPTS DE CABECERA -->
    <script src="../js/theme-persist.js"></script>
    <script src="../js/head-common.js"></script>
</head>
<body data-current-nav="depositos" id="depositos">

    <aside class="sidebar" id="main-sidebar"></aside>

    <main class="main-content" id="app-content"> 
        <header class="view-header">
            <h1 class="header-title">Depósitos</h1>
            <p class="subtitle-view">Simula el ingreso de fondos y fondea tu cuenta.</p>
        </header>
        
        <article class="card" style="max-width: 600px;">
            <form action="" method="POST" id="form-depositos">
                
                <div class="form-group"> 
                    <label class="form-label" for="origen_fondos">Origen de los fondos:</label>
                    <select name="origen_fondos" id="origen_fondos" class="form-control" required>
                        <option value="Taquilla">Taquilla Bancaria</option>
                        <option value="Cajero">Cajero Automático</option>
                        <option value="Transferencia">Transferencia Externa</option>
                    </select>
                </div>

                <div class="form-group"> 
                    <label class="form-label" for="monto_deposito">Monto a depositar (Bs.):</label>
                    <input type="text" id="monto_deposito" name="monto_deposito" class="form-control" placeholder="0.00" required>
                </div>

                <div class="form-group"> 
                    <label class="form-label" for="concepto_deposito">Concepto:</label>
                    <input type="text" id="concepto_deposito" name="concepto_deposito" class="form-control" placeholder="Ej: Ahorros, Pago de nómina..." required>
                </div>

                <button type="submit" id="btn-depositar" class="btn-primary">Registrar Depósito</button>
            </form>
        </article>
    </main>

    <script src="../js/sidebar.js"></script>
    <script src="../js/cuentas.js"></script>
    <script src="../js/dashboard-detalles_operaciones.js"></script>
</body>
</html>
