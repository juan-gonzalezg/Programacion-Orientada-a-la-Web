<!DOCTYPE html>
<html lang="es" data-theme="light" data-page-title="Banca 360 - Detalle de Transacción">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca 360 - Detalle de Transacción</title>
    
    <!-- FUENTE DE GOOGLE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 📍 EL ENLACE CORRECTO AL CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- 📍 RUTAS CORRECTAS A LOS SCRIPTS DE CABECERA -->
    <script src="../js/theme-persist.js"></script>
    <script src="../js/head-common.js"></script>
</head>
<body data-current-nav="detalle">

    <aside class="sidebar" id="main-sidebar"></aside>

    <main class="main-content" id="app-content">

        <section id="transaction-detail-view" class="view-section active" aria-labelledby="detail-title">
            <header class="section-header">
                <h1 id="detail-title" class="header-title">Detalle de Operación</h1>
                
                <button type="button" id="back-to-history-btn" class="btn-outline-small">
                    <span aria-hidden="true">⬅</span> Volver
                </button>
            </header>

            <article class="card receipt-card">
                <div class="receipt-header">
                    <div class="tx-icon icon-large" id="detail-receipt-icon" aria-hidden="true">🧾</div>
                    <h2 class="tx-amount-large amount-out" id="detail-amount">—</h2>
                    <p class="receipt-status success" id="detail-status">—</p>
                </div>
                
                <!-- AGREGADO: Cajas de texto con los IDs requeridos por el script -->
                <div class="receipt-body" style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 15px;">
                    <p style="margin-bottom: 8px;"><strong>Referencia:</strong> <span id="detail-ref">—</span></p>
                    <p style="margin-bottom: 8px;"><strong>Fecha:</strong> <span id="detail-date">—</span></p>
                    <p style="margin-bottom: 8px;"><strong>Descripción:</strong> <span id="detail-desc">—</span></p>
                    <p style="margin-bottom: 8px;"><strong>Banco Destino/Origen:</strong> <span id="detail-bank">—</span></p>
                </div>
            </article>
        </section>

    </main>

    <!-- 1. El script de la barra lateral (Estructura) -->
    <script src="../js/sidebar.js"></script>

    <!-- 2. Primero cargamos los datos para tenerlos en memoria (Debe ir antes de la lógica) -->
    <script src="../js/cuentas.js"></script>

    <!-- 3. Luego cargamos la lógica, que utilizará los datos -->
    <script src="../js/dashboard-detalles_operaciones.js"></script>
</body>
</html>
