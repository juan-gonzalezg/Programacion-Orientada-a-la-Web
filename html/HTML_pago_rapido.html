<!DOCTYPE html>
<html lang="es" data-theme="light" data-page-title="Banca 360 - Pago Rápido">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca 360 - Pago Rápido</title>
    
    <!-- FUENTE DE GOOGLE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 📍 EL ENLACE CORRECTO AL CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- 📍 RUTAS CORRECTAS A LOS SCRIPTS DE CABECERA -->
    <script src="../js/theme-persist.js"></script>
    <script src="../js/head-common.js"></script>
</head>
<body data-current-nav="pago rapido" id="pago_rapido">

    <aside class="sidebar" id="main-sidebar"></aside>

    <main class="main-content" id="app-content">  
        <header class="view-header">
            <h1 class="header-title">Pago Rápido</h1>
            <p class="subtitle-view">La manera más ágil de liquidar transacciones al instante.</p>
        </header>

        <article class="card" style="max-width: 600px; margin: 0 auto;">
            <form action="" method="POST"> 

                <div class="form-group"> 
                    <label class="form-label" for="monto">Monto (Bs.):</label>
                    <input type="text" id="monto" name="monto_pago_rapido" class="form-control" placeholder="0.00" required>
                </div>

                <div class="form-group"> 
                    <label class="form-label" for="datos_documento">Documento del Destinatario:</label>
                    <div class="input-group">
                        <select name="tipo_documento" id="selector_documento" class="form-control">
                            <option value="V">V</option>
                            <option value="E">E</option>
                            <option value="J">J</option>
                            <option value="P">P</option>
                        </select>
                        <input type="text" id="datos_documento" name="datos_del_documento" class="form-control" placeholder="Número de cédula" maxlength="10" required>
                    </div>
                </div>
                
                <div class="form-group"> 
                    <label class="form-label" for="telefono">Teléfono celular:</label>
                    <input type="text" id="telefono" name="telefono" class="form-control" placeholder="04141234567" maxlength="11" required>
                </div>
                
                <div class="form-group"> 
                    <label class="form-label" for="selector_banco">Banco destino:</label>
                    <select name="selector_banco" id="selector_banco" class="form-control">
                        <option value="Bancamiga">Bancamiga</option>
                        <option value="Bancaribe">Bancaribe</option>
                        <option value="Banesco">Banesco</option>
                        <option value="Mercantil">Mercantil</option>
                        <option value="Provincial">Provincial</option>
                        <option value="Venezuela">Banco de Venezuela</option>
                    </select>
                </div>

              <button type="submit" id="realizar" class="btn-primary">Emitir Pago Móvil</button>
            </form>
        </article>
    </main>

    <script src ="../js/transferencia.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/cuentas.js"></script>
    <script src="../js/dashboard-detalles_operaciones.js"></script>
</body>
</html>
