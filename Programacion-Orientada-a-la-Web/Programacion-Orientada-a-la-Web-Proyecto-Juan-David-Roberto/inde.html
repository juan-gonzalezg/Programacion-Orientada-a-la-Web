<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Autenticación Segura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SECCIÓN 1: REGISTRO -->
    <div id="seccion-registro" style="display:none;">
        <h2>Registro de Nuevo Cliente</h2>
        <form id="form-registro">
            <label>Correo Electrónico:</label><br>
            <input type="email" required><br><br>

            <label>Contraseña (6 números):</label><br>
            <input type="password" id="pass1" pattern="\d{6,}" title="Debe contener al menos 6 números" required><br><br>

            <label>Confirmar Contraseña:</label><br>
            <input type="password" id="pass2" required><br><br>

            <button type="submit">Registrar</button>
        </form>
    </div>

    <!-- SECCIÓN 2: PREGUNTAS DE SEGURIDAD (Oculta al inicio) -->
    <div id="seccion-preguntas" style="display:none;">
        <h2>Configuración de Seguridad Obligatoria</h2>
        <form id="form-preguntas">
            <label>¿Nombre de tu primera mascota?</label><br>
            <input type="text" required><br><br>
            
            <label>¿Ciudad de nacimiento?</label><br>
            <input type="text" required><br><br>

            <button type="submit">Guardar Configuración</button>
        </form>
    </div>

    <!-- SECCIÓN 3: LOGIN -->
    <div id="seccion-login" >
        <h2>Iniciar Sesión</h2>
        <form id="form-login">
            <input type="email" placeholder="Correo" required><br><br>
            <input type="password" placeholder="Contraseña" required><br><br>
            <button type="submit" id="btn-entrar">Entrar</button>
        </form>

        <p>¿No tienes cuenta?</p>
        <button id="btn-ir-registro">Crear cuenta nueva</button>

        <!-- Indicador de carga (Spinner) -->
        <div id="spinner" style="display:none;">
            <p><strong>Validando credenciales con el servidor central...</strong></p>
        </div>
    </div>

    <!-- SECCIÓN 4: ACCESO CONCEDIDO -->
    <div id="seccion-final" style="display:none;">
        <h1>Bienvenido al Sistema</h1>
        <p>Acceso validado correctamente.</p>
    </div>

    <footer style="text-align: center; margin-top: 20px;">
        <p>Síguenos en nuestras redes:</p>
        <ion-icon name="logo-instagram"></ion-icon>
        <ion-icon name="logo-facebook"></ion-icon>
        <ion-icon name="logo-twitter"></ion-icon>
        <ion-icon name="logo-youtube"></ion-icon>
    </footer>

    <script>
        // 1. Definición de constantes (Solo una vez)
        const regForm = document.getElementById('form-registro');
        const pregForm = document.getElementById('form-preguntas');
        const loginForm = document.getElementById('form-login');
        const btnIrRegistro = document.getElementById('btn-ir-registro');
        
        const seccionLogin = document.getElementById('seccion-login');
        const seccionRegistro = document.getElementById('seccion-registro');
        const seccionPreguntas = document.getElementById('seccion-preguntas');
        const seccionFinal = document.getElementById('seccion-final');
        const spinner = document.getElementById('spinner');
        const btnEntrar = document.getElementById('btn-entrar');

        // 2. Lógica de Login (SOLO UNA FUNCIÓN)
        // El botón "Entrar" ahora solo lleva a la sección Final
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            spinner.style.display = 'block';
            btnEntrar.disabled = true;

            setTimeout(() => {
                seccionLogin.style.display = 'none';
                seccionFinal.style.display = 'block'; // Acceso directo a bienvenida
                
                spinner.style.display = 'none';
                btnEntrar.disabled = false;
            }, 2000);
        });

        // 3. Lógica para ir a Registro desde Login
        btnIrRegistro.addEventListener('click', () => {
            seccionLogin.style.display = 'none';
            seccionRegistro.style.display = 'block';
        });

        // 4. Lógica de Registro y Validación
        regForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;

            if (p1 !== p2) {
                alert("Las contraseñas no coinciden.");
                return;
            }
            
            alert("Registro exitoso. Configure sus preguntas.");
            seccionRegistro.style.display = 'none';
            seccionPreguntas.style.display = 'block';
        });

        // 5. Guardar preguntas y volver al Login (o a donde prefieras)
        pregForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Seguridad configurada.");
            seccionPreguntas.style.display = 'none';
            seccionLogin.style.display = 'block'; // Regresa al login para entrar con la cuenta nueva
        });
    </script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>


</body>
</html>
