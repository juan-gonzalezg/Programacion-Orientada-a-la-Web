<!DOCTYPE html>
<html lang="es" data-theme="light" data-page-title="Banca 360 - Historial">
<head>
    <meta charset="UTF-8">
    <script src="js/theme-persist.js"></script>
    <script src="js/head-common.js"></script>
</head>
<body data-current-nav="historial">

    <aside class="sidebar" id="main-sidebar"></aside>

    <main class="main-content" id="app-content">
        
        <!-- 📍 DEFENSA: HISTORIAL EXHAUSTIVO -->
        <section id="history-view" class="view-section active" aria-labelledby="history-title">
            <header class="view-header">
                <h1 id="history-title" class="header-title">Historial de Movimientos</h1>
            </header>

            <!-- 📍 DEFENSA: FILTROS RÁPIDOS -->
            <nav class="filters" aria-label="Filtros de transacciones">
                <button type="button" id="filter-all" class="filter-btn active" data-filter="all">Todos los movimientos</button>
                <button type="button" id="filter-income" class="filter-btn" data-filter="in">Solo entradas</button>
                <button type="button" id="filter-outcome" class="filter-btn" data-filter="out">Solo salidas</button>
            </nav>

            <div class="tx-list" id="full-tx-list">
                <!-- 📍 DEFENSA: Aquí el JavaScript pintará los artículos de forma dinámica -->
            </div>
        </section>

    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/script_p2.js"></script>
</body>
</html>
