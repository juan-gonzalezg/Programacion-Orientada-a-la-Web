<!DOCTYPE html>
<!-- ========================================== -->
<!-- 📍 DEFENSA (ATRIBUTO PERSONALIZADO): 
     data-theme="light": Es un atributo personalizado (HTML5 permite crear atributos propios si empiezan con "data-"). 
     Lo usamos para que nuestro CSS sepa qué variables de colores usar (Modo Claro o Modo Oscuro). 
     El JavaScript cambiará este valor a "dark" al presionar el botón. -->
<!-- ========================================== -->
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca 360 - Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style_p2.css">
    
    <!-- ========================================== -->
    <!-- 📍 DEFENSA (RENDIMIENTO): 
         Este script bloqueante pre-carga el modo oscuro ANTES de 
         que el navegador pinte la pantalla, evitando el parpadeo (FOUC). -->
    <!-- ========================================== -->
    <script>
        if(localStorage.getItem('temaPreferido') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

    <aside class="sidebar" id="main-sidebar">
        <div class="brand-logo">
            <!-- ========================================== -->
            <!-- 📍 DEFENSA (ACCESIBILIDAD): 
                 aria-hidden="true": Le dice a los lectores de pantalla (para ciegos) que ignoren este emoji. 
                 Si no lo ponemos, el lector leería en voz alta "Edificio de banco" y arruinaría la experiencia. -->
            <!-- ========================================== -->
            <span class="logo-icon" aria-hidden="true">🏦</span>
            <span class="logo-text">Banca 360</span>
        </div>
        
        <!-- ========================================== -->
        <!-- 📍 DEFENSA (ACCESIBILIDAD): 
             aria-label: Describe de forma invisible qué hace este contenedor para los lectores de pantalla. -->
        <!-- ========================================== -->
        <nav class="main-nav" aria-label="Navegación Principal">
            <ul class="nav-links">
                <li>
                    <!-- ========================================== -->
                    <!-- 📍 DEFENSA (CLASE CSS): 
                         class="... active": Esta clase le avisa al CSS que este es el botón actual donde estamos parados 
                         para que lo pinte distinto (ej. fondo sombreado). -->
                    <!-- ========================================== -->
                    <a href="dashboard_resumen.html" class="nav-item active" id="link-dashboard">
                        <span class="nav-icon" aria-hidden="true">🏠</span>
                        <span class="nav-text">Resumen</span>
                    </a>
                </li>
                <li>
                    <a href="historial_movimientos.html" class="nav-item" id="link-history">
                        <span class="nav-icon" aria-hidden="true">📋</span>
                        <span class="nav-text">Historial</span>
                    </a>
                </li>
                <li>
                    <a href="#transfers-view" class="nav-item" id="link-transfers">
                        <span class="nav-icon" aria-hidden="true">💸</span>
                        <span class="nav-text">Transferir</span>
                    </a>
                </li>
                <li>
                    <a href="#profile-view" class="nav-item" id="link-profile">
                        <span class="nav-icon" aria-hidden="true">👤</span>
                        <span class="nav-text">Perfil</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <button type="button" id="toggle-theme-btn" class="btn-outline">
                <span aria-hidden="true">🌓</span> Modo Oscuro
            </button>
            <button type="button" id="logout-btn" class="btn-outline btn-logout">
                Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="main-content" id="app-content">
        
        <!-- 📍 DEFENSA: DASHBOARD / LANDING PAGE -->
        <!-- NOTA: aria-labelledby enlaza esta sección con el ID de su título para mayor accesibilidad -->
        <section id="dashboard-view" class="view-section active" aria-labelledby="dashboard-title">
            <header class="view-header">
                <h1 id="dashboard-title" class="header-title">Hola, Alejandro</h1>
            </header>
            
            <!-- 📍 DEFENSA: SALDO CON FUNCIÓN OCULTAR -->
            <article class="card balance-card">
                <h2 class="balance-label">Saldo Disponible</h2>
                <div class="balance-wrapper">
                    <span id="balance-amount" class="balance-amount">Bs. 4,500.00</span>
                    <button type="button" id="toggle-visibility-btn" class="btn-icon" aria-label="Ocultar Saldo">
                        <span id="visibility-icon" aria-hidden="true">👁️</span>
                    </button>
                </div>
            </article>

            <nav class="quick-actions" aria-label="Acciones Rápidas">
                <button type="button" class="action-btn" id="qa-transfer">
                    <span class="action-icon" aria-hidden="true">💸</span>
                    <span class="action-label">Transferir</span>
                </button>
                <button type="button" class="action-btn" id="qa-mobile-payment">
                    <span class="action-icon" aria-hidden="true">📱</span>
                    <span class="action-label">Pago Móvil</span>
                </button>
                <button type="button" class="action-btn" id="qa-deposit">
                    <span class="action-icon" aria-hidden="true">⬇️</span>
                    <span class="action-label">Ingresar</span>
                </button>
            </nav>

            <!-- 📍 DEFENSA: ÚLTIMAS 3 TRANSACCIONES -->
            <section class="recent-transactions">
                <header class="section-header">
                    <h3 class="section-title">Últimos Movimientos</h3>
                    <a href="historial_movimientos.html" class="link-primary" id="link-view-all">Ver todos</a>
                </header>
                
                <!-- 📍 DEFENSA: Se deja el contenedor vacío para que JS se encargue de pintarlo sin "saltos" visuales -->
                <div class="tx-list" id="recent-tx-list"></div>
            </section>
        </section>

    </main>

    <script src="script_p2.js"></script>
</body>
</html>
